<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LATHE // dashboard</title>
<style>
  :root {
    --bg: #0a0b10;
    --panel: #111218;
    --panel-hi: #161822;
    --border: #1e1f2a;
    --border-hi: #2a2c3a;
    --text: #d8dae5;
    --muted: #6b6d80;
    --dim: #40424f;
    --green: #5bffb0;
    --amber: #ffcc66;
    --blue: #6fa8ff;
    --red: #ff5b7a;
    --violet: #a87aff;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.45; }
  body { min-height: 100vh; padding: 0; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar .brand { font-weight: 700; letter-spacing: 0.25em; font-size: 13px; color: var(--text); }
  .topbar .brand .slash { color: var(--violet); margin: 0 6px; }
  .topbar .stat { display: flex; align-items: baseline; gap: 6px; }
  .topbar .stat .label { color: var(--muted); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
  .topbar .stat .value { font-size: 16px; font-weight: 600; color: var(--text); }
  .topbar .spacer { flex: 1; }
  .topbar .live { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .topbar .live.ok .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .topbar .live.err .dot { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.pulse { animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
    gap: 16px;
    padding: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s ease;
  }
  .card:hover { border-color: var(--border-hi); }
  .card.flash { animation: flash 0.6s ease; }
  @keyframes flash { 0% { background: #1a1d2a; } 100% { background: var(--panel); } }

  .card-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-hi);
  }
  .card-head .project { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
  .card-head .phase {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 2px; background: var(--dim); color: var(--text);
  }
  .phase.phase-champion { background: rgba(111,168,255,0.15); color: var(--blue); border: 1px solid rgba(111,168,255,0.3); }
  .phase.phase-build { background: rgba(168,122,255,0.15); color: var(--violet); border: 1px solid rgba(168,122,255,0.3); }
  .phase.phase-verify { background: rgba(91,255,176,0.15); color: var(--green); border: 1px solid rgba(91,255,176,0.3); }
  .phase.phase-idle { background: rgba(107,109,128,0.2); color: var(--muted); border: 1px solid rgba(107,109,128,0.3); }
  .card-head .spacer { flex: 1; }
  .card-head .rate-limit {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 2px;
    background: rgba(255,91,122,0.15); color: var(--red); border: 1px solid rgba(255,91,122,0.3);
    animation: pulse 1.5s infinite;
  }

  .card-body { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; }
  .metric { display: flex; flex-direction: column; gap: 2px; }
  .metric .label { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .metric .value { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); }
  .metric .value .sub { color: var(--muted); font-size: 12px; font-weight: 400; margin-left: 4px; }
  .metric .value.big { font-size: 24px; }

  .sparkline {
    display: flex; gap: 3px;
    margin-top: 4px;
  }
  .sparkline span {
    display: inline-block;
    font-size: 9px; font-weight: 600;
    padding: 2px 4px; border-radius: 1px;
    min-width: 14px; text-align: center;
  }
  .sparkline span.P1 { background: rgba(91,255,176,0.15); color: var(--green); border: 1px solid rgba(91,255,176,0.3); }
  .sparkline span.P2 { background: rgba(255,204,102,0.15); color: var(--amber); border: 1px solid rgba(255,204,102,0.3); }
  .sparkline span.P3 { background: rgba(255,204,102,0.15); color: var(--amber); border: 1px solid rgba(255,204,102,0.3); }
  .sparkline span.P4 { background: rgba(255,204,102,0.15); color: var(--amber); border: 1px solid rgba(255,204,102,0.3); }
  .sparkline span.F  { background: rgba(255,91,122,0.15); color: var(--red); border: 1px solid rgba(255,91,122,0.3); }

  .card-section {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
  }
  .card-section .title {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px;
  }
  .commits { display: flex; flex-direction: column; gap: 3px; }
  .commit { display: flex; gap: 8px; font-size: 12px; align-items: baseline; }
  .commit .sha { color: var(--violet); min-width: 56px; font-weight: 600; }
  .commit .msg { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .commit .time { color: var(--muted); font-size: 11px; white-space: nowrap; }

  .log {
    font-size: 11px;
    color: var(--muted);
    max-height: 160px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    line-height: 1.5;
  }
  .log .line { display: flex; gap: 8px; padding: 1px 0; }
  .log .line .t { color: var(--dim); min-width: 54px; }
  .log .line .m { color: var(--text); }
  .log .line.ok .m { color: var(--green); }
  .log .line.warn .m { color: var(--amber); }
  .log .line.err .m { color: var(--red); }
  .log .line.info .m { color: var(--text); }
  .log::-webkit-scrollbar { width: 6px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

  .card-foot {
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  .card-foot .pill {
    border: 1px solid var(--border-hi); border-radius: 2px;
    padding: 2px 6px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
  }
  .empty h2 { color: var(--text); margin: 0 0 8px 0; font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
  .empty p { margin: 0; font-size: 13px; line-height: 1.6; }
  .empty code { color: var(--violet); background: var(--panel); padding: 2px 6px; border-radius: 2px; }

  .footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; gap: 16px; justify-content: space-between;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">LATHE <span class="slash">//</span> DASHBOARD</span>
  <div class="stat">
    <span class="label">Active</span>
    <span class="value" id="stat-active">—</span>
  </div>
  <div class="stat">
    <span class="label">Cycles</span>
    <span class="value" id="stat-cycles">—</span>
  </div>
  <div class="stat">
    <span class="label">Clean</span>
    <span class="value" id="stat-pass1">—</span>
  </div>
  <span class="spacer"></span>
  <span class="live" id="live"><span class="dot pulse"></span><span id="live-label">connecting</span></span>
</div>

<div id="content"></div>

<div class="footer">
  <span id="updated">—</span>
  <span>LOCALHOST ONLY // SSE @ /api/stream</span>
</div>

<script>
"use strict";

const $content = document.getElementById('content');
const $statActive = document.getElementById('stat-active');
const $statCycles = document.getElementById('stat-cycles');
const $statPass1 = document.getElementById('stat-pass1');
const $live = document.getElementById('live');
const $liveLabel = document.getElementById('live-label');
const $updated = document.getElementById('updated');

// Registry of stable card DOM keyed by pid. Values: { el, refs, prevCycle, prevPhase, seenLogKeys }.
// Cards are created once per pid, then updated field-by-field on each tick. This preserves
// scroll position inside each log, hover state, text selection, and prevents jank.
const cards = new Map();
let grid = null;
let reconnectAttempts = 0;

function fmtElapsed(sec) {
  sec = Math.max(0, Math.floor(sec || 0));
  const d = Math.floor(sec / 86400); sec -= d * 86400;
  const h = Math.floor(sec / 3600);  sec -= h * 3600;
  const m = Math.floor(sec / 60);    sec -= m * 60;
  if (d > 0) return d + "d " + h + "h";
  if (h > 0) return h + "h " + String(m).padStart(2, '0') + "m";
  if (m > 0) return m + "m " + String(sec).padStart(2, '0') + "s";
  return sec + "s";
}

// fmtCycleID renders a timestamp cycle ID (YYYYMMDD-HHMMSS, UTC) into a readable
// local-time label: "08:30:45" when today, "Apr 18 08:30" when not.
function fmtCycleID(id) {
  if (!id) return '—';
  const m = id.match(/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/);
  if (!m) return id;
  const d = new Date(Date.UTC(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]));
  const now = new Date();
  const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
  const t = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  if (sameDay) return t;
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}

function phaseClass(phase) {
  if (!phase) return 'phase-idle';
  if (phase.includes('champion') || phase.includes('goal')) return 'phase-champion';
  if (phase.includes('build')) return 'phase-build';
  if (phase.includes('verify')) return 'phase-verify';
  return 'phase-idle';
}

function logKind(msg) {
  if (!msg) return 'info';
  const m = msg.toLowerCase();
  if (m.includes('error') || m.includes('rate limited') || m.includes('failed')) return 'err';
  if (m.includes('warn') || m.includes('safety net')) return 'warn';
  if (m.includes('converged') || m.includes('passed') || m.includes('completed') || m.includes('done') || m.includes('merged')) return 'ok';
  return 'info';
}

function prUrl(l) {
  if (!l.pr_number || !l.repo_url) return null;
  return l.repo_url.replace(/\/$/, '') + "/pull/" + l.pr_number;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function createCard(lathe) {
  const card = el('div', 'card');
  card.setAttribute('data-pid', lathe.pid);

  // Head
  const head = el('div', 'card-head');
  const dot = el('span', 'dot pulse');
  dot.style.background = 'var(--green)';
  dot.style.boxShadow = '0 0 8px var(--green)';
  const project = el('span', 'project');
  const phase = el('span', 'phase');
  const spacer = el('span', 'spacer');
  const rateLimit = el('span', 'rate-limit', 'rate limited');
  rateLimit.style.display = 'none';
  head.append(dot, project, phase, spacer, rateLimit);

  // Body (metrics)
  const body = el('div', 'card-body');
  const mkMetric = (label) => {
    const m = el('div', 'metric');
    m.append(el('span', 'label', label));
    const v = el('span', 'value big');
    m.append(v);
    return { wrap: m, value: v };
  };
  const cycle = mkMetric('Cycle Started');
  const uptime = mkMetric('Uptime');

  const pass1Wrap = el('div', 'metric');
  pass1Wrap.append(el('span', 'label', 'Clean'));
  const pass1Val = el('span', 'value');
  const pass1Sub = el('span', 'sub');
  pass1Val.append(document.createTextNode('—'), pass1Sub);
  pass1Wrap.append(pass1Val);

  const verdictsWrap = el('div', 'metric');
  verdictsWrap.append(el('span', 'label', 'Verdicts'));
  const verdicts = el('div', 'sparkline');
  verdictsWrap.append(verdicts);

  body.append(cycle.wrap, uptime.wrap, pass1Wrap, verdictsWrap);

  // Commits section
  const commitsSection = el('div', 'card-section');
  commitsSection.append(el('div', 'title', 'Recent Commits'));
  const commits = el('div', 'commits');
  commitsSection.append(commits);

  // Log section (stable scroll container — never replaced)
  const logSection = el('div', 'card-section');
  logSection.append(el('div', 'title', 'Stream'));
  const log = el('div', 'log');
  logSection.append(log);

  // Footer
  const foot = el('div', 'card-foot');

  card.append(head, body, commitsSection, logSection, foot);

  return {
    el: card,
    refs: {
      project, phase, rateLimit,
      cycle: cycle.value,
      uptime: uptime.value,
      pass1Text: pass1Val.firstChild, // the text node before .sub
      pass1Sub,
      verdicts,
      commits,
      log,
      foot,
    },
    prevCycle: null,
    prevPhase: null,
    seenLogKeys: new Set(),
  };
}

function updateCard(entry, lathe) {
  const r = entry.refs;
  const stats = lathe.cycle_stats || { total: 0, pass_one: 0, pass_late: 0, failed: 0, verdicts: [] };
  const totalScored = stats.pass_one + stats.pass_late + stats.failed;
  const passOneRate = totalScored > 0 ? Math.round((stats.pass_one / totalScored) * 100) : null;

  // Head
  setText(r.project, lathe.project);
  setText(r.phase, lathe.phase || 'idle');
  const cls = 'phase ' + phaseClass(lathe.phase);
  if (r.phase.className !== cls) r.phase.className = cls;
  r.rateLimit.style.display = lathe.rate_limited ? '' : 'none';

  // Metrics
  setText(r.cycle, fmtCycleID(lathe.cycle_id));
  setText(r.uptime, fmtElapsed(lathe.elapsed_seconds));
  r.pass1Text.nodeValue = passOneRate !== null ? passOneRate + '% ' : '— ';
  setText(r.pass1Sub, stats.pass_one + '/' + (totalScored || 0));

  // Verdicts sparkline — rebuild (small, cheap, stateless)
  updateVerdicts(r.verdicts, stats.verdicts || []);

  // Commits — rebuild (short list, changes slowly)
  updateCommits(r.commits, lathe.recent_commits || []);

  // Log — APPEND new lines only, never replace. This preserves scroll position.
  updateLog(r.log, lathe.recent_logs || [], entry.seenLogKeys);

  // Footer — rebuild (small, changes rarely)
  updateFoot(r.foot, lathe);

  // Flash the card only on cycle/phase change (not on every tick)
  if (entry.prevCycle !== null && (entry.prevCycle !== lathe.cycle_id || entry.prevPhase !== lathe.phase)) {
    entry.el.classList.remove('flash');
    void entry.el.offsetWidth;
    entry.el.classList.add('flash');
  }
  entry.prevCycle = lathe.cycle_id;
  entry.prevPhase = lathe.phase;
}

function setText(node, text) {
  text = text == null ? '' : String(text);
  if (node.textContent !== text) node.textContent = text;
}

function updateVerdicts(container, verdicts) {
  // cheap rebuild — small list, class depends on content
  while (container.firstChild) container.removeChild(container.firstChild);
  if (!verdicts.length) {
    const dash = el('span', null, '—');
    dash.style.color = 'var(--muted)';
    dash.style.border = 'none';
    container.append(dash);
    return;
  }
  for (const v of verdicts) {
    container.append(el('span', v, v));
  }
}

function updateCommits(container, commits) {
  while (container.firstChild) container.removeChild(container.firstChild);
  if (!commits.length) {
    const p = el('span', null, 'no commits yet');
    p.style.color = 'var(--muted)';
    p.style.fontSize = '11px';
    container.append(p);
    return;
  }
  for (const c of commits.slice(0, 4)) {
    const row = el('div', 'commit');
    row.append(
      el('span', 'sha', c.sha),
      el('span', 'msg', c.message),
      el('span', 'time', c.time)
    );
    container.append(row);
  }
}

function updateLog(container, lines, seenKeys) {
  if (!lines.length) {
    if (!container.childElementCount) {
      const p = el('span', null, 'no activity yet');
      p.style.color = 'var(--muted)';
      container.append(p);
    }
    return;
  }

  // Detect follow-mode: was user at (or near) the bottom before we mutated?
  const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 8;

  // First paint (or logs were reset): remove the "no activity" placeholder if present.
  if (container.childElementCount === 1 && !container.firstElementChild.classList.contains('line')) {
    container.removeChild(container.firstElementChild);
  }

  let added = 0;
  for (const line of lines) {
    const key = line.time + '\x00' + line.message;
    if (seenKeys.has(key)) continue;
    seenKeys.add(key);
    const kind = logKind(line.message);
    const row = el('div', 'line ' + kind);
    row.append(
      el('span', 't', line.time),
      el('span', 'm', line.message)
    );
    container.append(row);
    added++;
  }

  // Cap DOM children so long-running lathes don't bloat the page.
  const MAX = 80;
  while (container.childElementCount > MAX) {
    const first = container.firstElementChild;
    // Also drop the corresponding key from seenKeys to keep it bounded.
    const t = first.querySelector('.t')?.textContent || '';
    const m = first.querySelector('.m')?.textContent || '';
    seenKeys.delete(t + '\x00' + m);
    container.removeChild(first);
  }

  // Auto-scroll to bottom ONLY when user was following. Respects manual scrolling up.
  if (added > 0 && wasAtBottom) {
    container.scrollTop = container.scrollHeight;
  }
}

function updateFoot(container, l) {
  while (container.firstChild) container.removeChild(container.firstChild);

  const pidPill = el('span', 'pill', 'PID ' + l.pid + (l.agent_pid ? ' + ' + l.agent_pid : ''));
  container.append(pidPill);
  container.append(el('span', 'pill', l.mode || '—'));
  if (l.branch) container.append(el('span', 'pill', l.branch));

  const prLink = prUrl(l);
  if (prLink) {
    const a = el('a');
    a.href = prLink;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = 'PR #' + l.pr_number + ' ↗';
    const wrap = el('span');
    wrap.append(a);
    container.append(wrap);
  } else if (l.pr_number) {
    container.append(el('span', null, 'PR #' + l.pr_number));
  }

  const spacer = el('span', 'spacer');
  spacer.style.flex = '1';
  container.append(spacer);

  const cwdSpan = el('span', null, l.cwd);
  cwdSpan.style.color = 'var(--dim)';
  cwdSpan.title = l.cwd;
  container.append(cwdSpan);
}

function renderEmpty() {
  const wrap = el('div', 'empty');
  const h = el('h2', null, 'NO LATHES RUNNING');
  const p1 = el('p');
  p1.innerHTML = 'Start one with <code>lathe start</code> from any lathe-initialized project.';
  const p2 = el('p');
  p2.style.marginTop = '16px';
  p2.style.fontSize = '11px';
  p2.style.color = 'var(--dim)';
  p2.innerHTML = 'This dashboard shows every <code>lathe _run</code> process on this machine.';
  wrap.append(h, p1, p2);
  return wrap;
}

function render(snap) {
  const lathes = snap.lathes || [];

  // Top stats
  setText($statActive, String(lathes.length));
  let passOne = 0, totalScored = 0;
  for (const l of lathes) {
    const s = l.cycle_stats || {};
    passOne += (s.pass_one || 0);
    totalScored += (s.pass_one || 0) + (s.pass_late || 0) + (s.failed || 0);
  }
  setText($statCycles, String(totalScored));
  setText($statPass1, totalScored > 0 ? Math.round((passOne / totalScored) * 100) + '%' : '—');

  if (lathes.length === 0) {
    // Clear grid, show empty state. No cards means no scroll positions to preserve.
    while ($content.firstChild) $content.removeChild($content.firstChild);
    $content.append(renderEmpty());
    cards.clear();
    grid = null;
  } else {
    if (!grid || !grid.isConnected) {
      while ($content.firstChild) $content.removeChild($content.firstChild);
      grid = el('div', 'grid');
      $content.append(grid);
      cards.clear();
    }

    const seen = new Set();
    for (const l of lathes) {
      seen.add(l.pid);
      let entry = cards.get(l.pid);
      if (!entry) {
        entry = createCard(l);
        cards.set(l.pid, entry);
        grid.append(entry.el);
      }
      updateCard(entry, l);
    }

    for (const [pid, entry] of cards) {
      if (!seen.has(pid)) {
        entry.el.remove();
        cards.delete(pid);
      }
    }
  }

  const ts = new Date(snap.collected_at).toLocaleTimeString();
  setText($updated, 'updated ' + ts);
}

function setLive(ok, label) {
  $live.classList.toggle('ok', ok);
  $live.classList.toggle('err', !ok);
  setText($liveLabel, label);
}

function connect() {
  const es = new EventSource('/api/stream');
  es.onmessage = ev => {
    try {
      const snap = JSON.parse(ev.data);
      render(snap);
      setLive(true, 'live');
      reconnectAttempts = 0;
    } catch (e) { console.error(e); }
  };
  es.onerror = () => {
    setLive(false, 'reconnecting');
    es.close();
    reconnectAttempts++;
    const delay = Math.min(10000, 500 * Math.pow(1.5, reconnectAttempts));
    setTimeout(connect, delay);
  };
}

fetch('/api/state').then(r => r.json()).then(render).catch(() => {});
connect();
</script>
